<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000d1a"/>
      <stop offset="100%" stop-color="#000510"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>

  <!-- 星々 -->
  <circle cx="20"  cy="18"  r="1.2" fill="#fff" opacity="0.8"/>
  <circle cx="45"  cy="35"  r="0.8" fill="#fff" opacity="0.6"/>
  <circle cx="160" cy="22"  r="1.0" fill="#fff" opacity="0.7"/>
  <circle cx="172" cy="55"  r="0.6" fill="#fff" opacity="0.5"/>
  <circle cx="140" cy="165" r="1.1" fill="#fff" opacity="0.7"/>
  <circle cx="30"  cy="155" r="0.9" fill="#fff" opacity="0.6"/>
  <circle cx="60"  cy="170" r="0.7" fill="#fff" opacity="0.5"/>
  <circle cx="178" cy="140" r="1.0" fill="#fff" opacity="0.6"/>
  <circle cx="90"  cy="14"  r="0.6" fill="#00e5ff" opacity="0.7"/>
  <circle cx="115" cy="175" r="0.8" fill="#00e5ff" opacity="0.6"/>
  <circle cx="170" cy="100" r="0.7" fill="#fff" opacity="0.4"/>
  <circle cx="10"  cy="90"  r="0.9" fill="#fff" opacity="0.5"/>

  <!-- 地面ライン -->
  <rect x="12" y="138" width="168" height="3" rx="1.5" fill="#1a3a5c" opacity="0.8"/>

  <!-- スピードライン（背景エフェクト） -->
  <line x1="14"  y1="85"  x2="35"  y2="85"  stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="14"  y1="92"  x2="28"  y2="92"  stroke="#00e5ff" stroke-width="0.7" opacity="0.2"/>
  <line x1="14"  y1="78"  x2="22"  y2="78"  stroke="#00e5ff" stroke-width="0.7" opacity="0.2"/>

  <!-- プレイヤーのグロー -->
  <ellipse cx="72" cy="120" rx="28" ry="12" fill="url(#glow)" filter="url(#blur)"/>

  <!-- プレイヤーキャラクター（スーツ型ランナー） -->
  <!-- ブーツ噴射炎 -->
  <ellipse cx="60" cy="132" rx="5" ry="9" fill="#ff6a00" opacity="0.7"/>
  <ellipse cx="60" cy="135" rx="3" ry="5" fill="#ffcc00" opacity="0.9"/>
  <ellipse cx="75" cy="132" rx="4" ry="7" fill="#ff6a00" opacity="0.6"/>
  <ellipse cx="75" cy="134" rx="2.5" ry="4" fill="#ffcc00" opacity="0.8"/>

  <!-- 体（胴体） -->
  <rect x="54" y="97" width="26" height="26" rx="4" fill="#1e3a5f"/>
  <rect x="56" y="99" width="22" height="22" rx="3" fill="#1565c0"/>
  <!-- 胸のコア -->
  <circle cx="67" cy="110" r="5" fill="#000d1a"/>
  <circle cx="67" cy="110" r="3.5" fill="#00e5ff"/>
  <circle cx="67" cy="110" r="2" fill="#fff" opacity="0.9"/>

  <!-- 脚 -->
  <rect x="55" y="121" width="10" height="14" rx="3" fill="#1565c0"/>
  <rect x="69" y="121" width="10" height="14" rx="3" fill="#1565c0"/>
  <rect x="54" y="131" width="12" height="6"  rx="2" fill="#0d47a1"/>
  <rect x="68" y="131" width="12" height="6"  rx="2" fill="#0d47a1"/>

  <!-- 左腕 -->
  <rect x="43" y="99" width="11" height="8" rx="3" fill="#1565c0"/>
  <!-- 右腕（前方・攻撃モーション） -->
  <rect x="80" y="96" width="14" height="8" rx="3" fill="#1565c0"/>
  <!-- 右手エネルギー -->
  <circle cx="96" cy="100" r="5" fill="#00e5ff" opacity="0.5" filter="url(#blur)"/>
  <circle cx="96" cy="100" r="3" fill="#00e5ff"/>
  <circle cx="96" cy="100" r="1.5" fill="#fff"/>

  <!-- ヘルメット -->
  <ellipse cx="67" cy="90" rx="14" ry="13" fill="#0d47a1"/>
  <ellipse cx="67" cy="88" rx="12" ry="10" fill="#1565c0"/>
  <!-- バイザー -->
  <ellipse cx="67" cy="88" rx="9"  ry="7"  fill="#000d1a" opacity="0.9"/>
  <ellipse cx="67" cy="88" rx="7"  ry="5"  fill="#00e5ff" opacity="0.25"/>
  <ellipse cx="63" cy="85" rx="2"  ry="1.5" fill="#fff" opacity="0.4"/>
  <!-- アンテナ -->
  <line x1="67" y1="77" x2="72" y2="70" stroke="#1565c0" stroke-width="2"/>
  <circle cx="72" cy="69" r="2.5" fill="#00e5ff"/>

  <!-- 攻撃エフェクト（スラッシュ弧） -->
  <path d="M 98 80 Q 130 90 128 115" stroke="#00e5ff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M 102 78 Q 138 90 136 118" stroke="#00e5ff" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- スラッシュ先端の輝き -->
  <circle cx="128" cy="115" r="5" fill="#00e5ff" opacity="0.4" filter="url(#blur)"/>
  <circle cx="128" cy="115" r="3" fill="#00e5ff"/>

  <!-- 遠方の敵（小） -->
  <rect x="148" y="102" width="18" height="14" rx="3" fill="#8b0000" opacity="0.85"/>
  <circle cx="157" cy="101" r="5" fill="#b00" opacity="0.7"/>
  <rect x="151" y="112" width="4"  height="6"  rx="1" fill="#6b0000" opacity="0.8"/>
  <rect x="159" y="112" width="4"  height="6"  rx="1" fill="#6b0000" opacity="0.8"/>

  <!-- タイトルテキスト -->
  <text x="96" y="164" font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        font-size="16" fill="#00e5ff" text-anchor="middle" letter-spacing="3">VOID</text>
  <text x="96" y="180" font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        font-size="16" fill="#ffffff" text-anchor="middle" letter-spacing="3">RUNNER</text>

  <!-- 外枠グロー -->
  <rect x="1" y="1" width="190" height="190" rx="32" fill="none"
        stroke="#00e5ff" stroke-width="1.5" opacity="0.4"/>
</svg>
