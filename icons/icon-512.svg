<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000d1a"/>
      <stop offset="100%" stop-color="#000510"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blurSm">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- 星々 -->
  <circle cx="50"  cy="45"  r="2.5" fill="#fff" opacity="0.8"/>
  <circle cx="120" cy="90"  r="1.8" fill="#fff" opacity="0.6"/>
  <circle cx="420" cy="55"  r="2.2" fill="#fff" opacity="0.7"/>
  <circle cx="460" cy="140" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="380" cy="440" r="2.3" fill="#fff" opacity="0.7"/>
  <circle cx="80"  cy="420" r="1.8" fill="#fff" opacity="0.6"/>
  <circle cx="155" cy="460" r="1.6" fill="#fff" opacity="0.5"/>
  <circle cx="475" cy="375" r="2.0" fill="#fff" opacity="0.6"/>
  <circle cx="245" cy="35"  r="1.4" fill="#00e5ff" opacity="0.7"/>
  <circle cx="305" cy="475" r="1.8" fill="#00e5ff" opacity="0.6"/>
  <circle cx="455" cy="268" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="28"  cy="240" r="2.0" fill="#fff" opacity="0.5"/>
  <circle cx="498" cy="60"  r="1.2" fill="#00e5ff" opacity="0.5"/>
  <circle cx="22"  cy="330" r="1.4" fill="#fff" opacity="0.4"/>
  <circle cx="330" cy="28"  r="1.2" fill="#fff" opacity="0.6"/>

  <!-- 地面ライン -->
  <rect x="30" y="368" width="452" height="7" rx="3.5" fill="#1a3a5c" opacity="0.8"/>

  <!-- スピードライン -->
  <line x1="30"  y1="228" x2="90"  y2="228" stroke="#00e5ff" stroke-width="2.5" opacity="0.3"/>
  <line x1="30"  y1="248" x2="72"  y2="248" stroke="#00e5ff" stroke-width="1.8" opacity="0.2"/>
  <line x1="30"  y1="210" x2="58"  y2="210" stroke="#00e5ff" stroke-width="1.8" opacity="0.2"/>
  <line x1="30"  y1="265" x2="50"  y2="265" stroke="#00e5ff" stroke-width="1.2" opacity="0.15"/>

  <!-- プレイヤーのグロー -->
  <ellipse cx="192" cy="325" rx="75" ry="32" fill="url(#glow)" filter="url(#blur)"/>

  <!-- プレイヤーキャラクター（大版） -->
  <!-- ブーツ噴射炎 -->
  <ellipse cx="160" cy="352" rx="13" ry="24" fill="#ff6a00" opacity="0.7"/>
  <ellipse cx="160" cy="360" rx="8"  ry="14" fill="#ffcc00" opacity="0.9"/>
  <ellipse cx="200" cy="352" rx="11" ry="19" fill="#ff6a00" opacity="0.6"/>
  <ellipse cx="200" cy="358" rx="7"  ry="11" fill="#ffcc00" opacity="0.8"/>

  <!-- 体（胴体） -->
  <rect x="144" y="259" width="70"  height="70"  rx="10" fill="#1e3a5f"/>
  <rect x="149" y="264" width="60"  height="60"  rx="8"  fill="#1565c0"/>
  <!-- 胸のコア -->
  <circle cx="179" cy="294" r="14"  fill="#000d1a"/>
  <circle cx="179" cy="294" r="10"  fill="#00e5ff"/>
  <circle cx="179" cy="294" r="6"   fill="#fff" opacity="0.9"/>
  <circle cx="175" cy="290" r="2.5" fill="#fff" opacity="0.5"/>

  <!-- 脚 -->
  <rect x="146" y="325" width="28" height="38" rx="8" fill="#1565c0"/>
  <rect x="184" y="325" width="28" height="38" rx="8" fill="#1565c0"/>
  <rect x="143" y="350" width="33" height="18" rx="6" fill="#0d47a1"/>
  <rect x="181" y="350" width="33" height="18" rx="6" fill="#0d47a1"/>

  <!-- 左腕 -->
  <rect x="114" y="264" width="30" height="22" rx="8" fill="#1565c0"/>
  <!-- 右腕（前方・攻撃モーション） -->
  <rect x="214" y="256" width="38" height="22" rx="8" fill="#1565c0"/>
  <!-- 右手エネルギー -->
  <circle cx="258" cy="267" r="14" fill="#00e5ff" opacity="0.5" filter="url(#blurSm)"/>
  <circle cx="258" cy="267" r="8"  fill="#00e5ff"/>
  <circle cx="258" cy="267" r="4"  fill="#fff"/>

  <!-- ヘルメット -->
  <ellipse cx="179" cy="242" rx="38" ry="35" fill="#0d47a1"/>
  <ellipse cx="179" cy="236" rx="32" ry="27" fill="#1565c0"/>
  <!-- バイザー -->
  <ellipse cx="179" cy="236" rx="24" ry="19" fill="#000d1a" opacity="0.9"/>
  <ellipse cx="179" cy="236" rx="19" ry="14" fill="#00e5ff" opacity="0.25"/>
  <ellipse cx="168" cy="228" rx="5"  ry="4"  fill="#fff" opacity="0.4"/>
  <!-- アンテナ -->
  <line x1="179" y1="207" x2="192" y2="188" stroke="#1565c0" stroke-width="5"/>
  <circle cx="192" cy="186" r="7" fill="#00e5ff"/>

  <!-- 攻撃エフェクト（スラッシュ弧） -->
  <path d="M 264 215 Q 355 240 350 308" stroke="#00e5ff" stroke-width="7"  fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M 272 210 Q 368 240 365 315" stroke="#00e5ff" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 268 220 Q 360 244 356 310" stroke="#fff"    stroke-width="2"   fill="none" stroke-linecap="round" opacity="0.3"/>
  <!-- スラッシュ先端の輝き -->
  <circle cx="350" cy="308" r="16" fill="#00e5ff" opacity="0.35" filter="url(#blur)"/>
  <circle cx="350" cy="308" r="8"  fill="#00e5ff"/>
  <circle cx="350" cy="308" r="4"  fill="#fff"/>

  <!-- 遠方の敵（小）複数 -->
  <rect x="390" y="272" width="52" height="40" rx="8"  fill="#8b0000" opacity="0.85"/>
  <circle cx="416" cy="270" r="14" fill="#b00" opacity="0.7"/>
  <rect x="397" y="307" width="11" height="18" rx="3" fill="#6b0000" opacity="0.8"/>
  <rect x="418" y="307" width="11" height="18" rx="3" fill="#6b0000" opacity="0.8"/>

  <rect x="445" y="234" width="34" height="26" rx="5"  fill="#8b0000" opacity="0.6"/>
  <circle cx="462" cy="233" r="9"  fill="#b00" opacity="0.5"/>

  <!-- タイトルテキスト -->
  <text x="256" y="434" font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        font-size="46" fill="#00e5ff" text-anchor="middle" letter-spacing="8">VOID</text>
  <text x="256" y="486" font-family="'Arial Black', Arial, sans-serif" font-weight="900"
        font-size="46" fill="#ffffff" text-anchor="middle" letter-spacing="8">RUNNER</text>

  <!-- 外枠グロー -->
  <rect x="3" y="3" width="506" height="506" rx="80" fill="none"
        stroke="#00e5ff" stroke-width="4" opacity="0.4"/>
</svg>
